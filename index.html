<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./Css/style.css" />

  <body>
    <div class="webMainDiv">
      <header>
        <nav id="mainNav" class="mainContainer">
          <div id="logo">
            <img src="./avatar/logo.png" alt="Explore World" />
          </div>
          <div id="navLinks">
            <ul>
              <li><a href="#">Home</a></li>
              <li><a href="#">Destinations</a></li>
              <li><a href="#">Packages</a></li>

      <section id="heroSection">
